# Brands monitored by the pipeline.
# Keywords are matched case-insensitively (whole-word) against post title + body.
# The matched brand name becomes the Kafka partition key, ensuring all events for
# one brand land on the same partition for stateful locality in Flink.
#
# Replace these examples with the brands relevant to your dataset.
brands:
  - name: apple
    keywords: ["apple", "iphone", "ipad", "macbook", "ios", "macos", "airpods"]
    subreddits: ["all"]
  - name: samsung
    keywords: ["samsung", "galaxy", "one ui"]
    subreddits: ["all"]
  - name: tesla
    keywords: ["tesla", "elon musk", "cybertruck", "model 3", "model s", "model x", "model y"]
    subreddits: ["all"]
  - name: twitter
    keywords: ["twitter", "tweet", "x.com", "elon twitter"]
    subreddits: ["all"]
  - name: reddit
    keywords: ["reddit", "r/", "subreddit", "redditors"]
    subreddits: ["all"]
